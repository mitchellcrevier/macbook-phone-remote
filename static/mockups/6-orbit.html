<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Orbit — Concept 06: Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06061a;
      --bg2: #0a0a24;
      --surface: rgba(120,80,255,0.06);
      --surface-hi: rgba(120,80,255,0.12);
      --border: rgba(120,80,255,0.15);
      --border-hi: rgba(120,80,255,0.35);
      --text: #e2e0ff;
      --text-mid: #7b78a8;
      --text-dim: #3d3b5e;
      --accent: #a78bfa;
      --accent-bright: #c4b5fd;
      --accent-bg: rgba(167,139,250,0.1);
      --accent-border: rgba(167,139,250,0.25);
      --cyan: #22d3ee;
      --danger: #f87171;
      --r: 20px;
      --font: 'Space Grotesk', sans-serif;
      --mono: 'Space Mono', monospace;
    }

    html, body {
      height: 100%;
      background: #03030f;
      color: var(--text);
      font-family: var(--font);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    .back-link {
      font-size: 11px;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: var(--mono);
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent); }

    #phone {
      width: 390px;
      height: 844px;
      background: var(--bg);
      border-radius: 48px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 20px 18px 32px;
      gap: 12px;
      position: relative;
      border: 1px solid rgba(120,80,255,0.12);
      box-shadow:
        0 0 0 1px rgba(167,139,250,0.04) inset,
        0 60px 120px rgba(0,0,0,0.9),
        0 0 80px rgba(167,139,250,0.06),
        0 0 160px rgba(34,211,238,0.03);
    }

    /* Star field */
    #phone::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.6) 1px, transparent 1px),
        radial-gradient(circle, rgba(167,139,250,0.4) 1px, transparent 1px),
        radial-gradient(circle, rgba(34,211,238,0.3) 1px, transparent 1px);
      background-size: 80px 80px, 120px 120px, 160px 160px;
      background-position: 10px 10px, 40px 60px, 90px 30px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    #phone::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 30% 20%, rgba(167,139,250,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 70% 80%, rgba(34,211,238,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      height: 44px;
      position: relative;
      z-index: 2;
    }

    #wordmark {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-bright);
      font-family: var(--mono);
    }

    #status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-radius: 20px;
      padding: 5px 12px 5px 8px;
    }

    #status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      animation: ping 2.4s ease-in-out infinite;
    }

    @keyframes ping {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,211,238,0.6); opacity: 1; }
      50% { box-shadow: 0 0 0 4px rgba(34,211,238,0); opacity: 0.7; }
    }

    #status-text {
      font-size: 9px;
      font-weight: 700;
      color: var(--cyan);
      font-family: var(--mono);
      letter-spacing: 0.12em;
    }

    #btn-power {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(248,113,113,0.07);
      border: 1px solid rgba(248,113,113,0.18);
      color: var(--danger);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.18s cubic-bezier(0.16, 1, 0.3, 1);
      touch-action: manipulation;
    }

    #btn-power:active {
      background: rgba(248,113,113,0.18);
      transform: scale(0.92);
    }

    /* Altitude readout strip */
    #readout {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      padding: 8px 14px;
      background: rgba(120,80,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      position: relative;
      z-index: 2;
    }

    .readout-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .readout-val {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-bright);
      font-family: var(--mono);
      letter-spacing: -0.02em;
    }

    .readout-lbl {
      font-size: 7px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    .readout-div {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    #main {
      flex: 1;
      display: flex;
      gap: 10px;
      min-height: 0;
      position: relative;
      z-index: 2;
    }

    #sliders {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 50px;
      flex-shrink: 0;
    }

    .pill-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .pill-label {
      font-size: 7px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    .pill-track {
      flex: 1;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 25px;
      position: relative;
      overflow: hidden;
      cursor: ns-resize;
      transition: border-color 0.2s;
    }

    .pill-track:hover { border-color: var(--border-hi); }
    .pill-track.dragging { border-color: rgba(167,139,250,0.5); }

    .pill-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      border-radius: 25px;
      transition: height 0.04s ease-out;
    }

    .pill-fill-vol {
      background: linear-gradient(to top,
        rgba(167,139,250,0.6) 0%,
        rgba(167,139,250,0.15) 60%,
        transparent 100%);
    }

    .pill-fill-spd {
      background: linear-gradient(to top,
        rgba(34,211,238,0.5) 0%,
        rgba(34,211,238,0.1) 60%,
        transparent 100%);
    }

    .pill-icon {
      position: absolute;
      top: 13px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0.18;
      pointer-events: none;
      z-index: 2;
    }

    .pill-val {
      position: absolute;
      bottom: 9px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 8px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      font-family: var(--mono);
      z-index: 2;
      pointer-events: none;
    }

    #trackpad {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      position: relative;
      overflow: hidden;
      cursor: none;
      transition: border-color 0.2s;
    }

    #trackpad.active { border-color: rgba(167,139,250,0.3); }

    /* Crosshair grid */
    #trackpad::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(120,80,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,80,255,0.06) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }

    /* Center crosshair */
    #trackpad::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent calc(50% - 0.5px), rgba(167,139,250,0.12) calc(50% - 0.5px), rgba(167,139,250,0.12) calc(50% + 0.5px), transparent calc(50% + 0.5px)),
        linear-gradient(transparent calc(50% - 0.5px), rgba(167,139,250,0.12) calc(50% - 0.5px), rgba(167,139,250,0.12) calc(50% + 0.5px), transparent calc(50% + 0.5px));
      pointer-events: none;
    }

    #tp-hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1;
    }

    #tp-hint svg { opacity: 0.1; }

    #tp-hint span {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    #trackpad.active #tp-hint { opacity: 0; }

    #cursor {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      box-shadow: 0 0 8px rgba(167,139,250,0.4);
    }

    #cursor-dot {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--cyan);
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.15s, opacity 0.2s;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
    }

    #trackpad.active #cursor,
    #trackpad.active #cursor-dot {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,0.4);
      width: 60px;
      height: 60px;
      margin-left: -30px;
      margin-top: -30px;
      animation: ripple-out 0.5s ease-out forwards;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes ripple-out {
      from { transform: scale(0.2); opacity: 1; }
      to { transform: scale(2.8); opacity: 0; }
    }

    #click-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex-shrink: 0;
      height: 78px;
      position: relative;
      z-index: 2;
    }

    .click-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    .click-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(167,139,250,0.05) 0%, transparent 60%);
    }

    .click-btn:hover { background: var(--surface-hi); border-color: var(--border-hi); }
    .click-btn:active { transform: scale(0.95); border-color: rgba(167,139,250,0.5); }

    .click-btn span {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    .click-btn svg { opacity: 0.45; transition: opacity 0.15s; }
    .click-btn:hover svg, .click-btn:active svg { opacity: 0.75; }

    @media (max-width: 500px) {
      body { background: var(--bg); padding: 0; display: block; }
      #phone {
        width: 100%;
        height: 100dvh;
        border-radius: 0;
        border: none;
        box-shadow: none;
        padding: 20px 16px env(safe-area-inset-bottom, 28px);
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← All concepts</a>

  <div id="phone">
    <div id="topbar">
      <span id="wordmark">Orbit</span>
      <div id="status-pill">
        <div id="status-dot"></div>
        <span id="status-text">LINKED</span>
      </div>
      <button id="btn-power" title="Sleep Mac">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </button>
    </div>

    <div id="readout">
      <div class="readout-item">
        <span class="readout-val" id="r-vol">60</span>
        <span class="readout-lbl">Volume</span>
      </div>
      <div class="readout-div"></div>
      <div class="readout-item">
        <span class="readout-val" id="r-spd">2.2</span>
        <span class="readout-lbl">Speed</span>
      </div>
      <div class="readout-div"></div>
      <div class="readout-item">
        <span class="readout-val" style="color: var(--cyan);">ON</span>
        <span class="readout-lbl">Display</span>
      </div>
    </div>

    <div id="main">
      <div id="sliders">
        <div class="pill-wrap">
          <span class="pill-label">Vol</span>
          <div class="pill-track" id="vol-track">
            <div class="pill-fill pill-fill-vol" id="vol-fill" style="height:60%"></div>
            <svg class="pill-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
            <span class="pill-val" id="vol-val">60</span>
          </div>
        </div>

        <div class="pill-wrap">
          <span class="pill-label">Spd</span>
          <div class="pill-track" id="spd-track">
            <div class="pill-fill pill-fill-spd" id="spd-fill" style="height:42%"></div>
            <svg class="pill-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
            <span class="pill-val" id="spd-val">2.2</span>
          </div>
        </div>
      </div>

      <div id="trackpad">
        <div id="tp-hint">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round">
            <rect x="5" y="2" width="14" height="20" rx="7"/>
            <line x1="12" y1="2" x2="12" y2="9"/>
          </svg>
          <span>Tap to click</span>
          <span>Drag to move</span>
        </div>
        <div id="cursor"></div>
        <div id="cursor-dot"></div>
      </div>
    </div>

    <div id="click-row">
      <button class="click-btn" id="btn-left">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <defs><clipPath id="lc6"><rect x="5" y="2" width="14" height="20" rx="7"/></clipPath></defs>
          <rect x="5" y="2" width="14" height="20" rx="7"/>
          <line x1="12" y1="2" x2="12" y2="10"/>
          <line x1="5" y1="10" x2="19" y2="10"/>
          <rect x="5" y="2" width="7" height="8" fill="currentColor" opacity="0.3" stroke="none" clip-path="url(#lc6)"/>
        </svg>
        <span>Primary</span>
      </button>
      <button class="click-btn" id="btn-right">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <defs><clipPath id="rc6"><rect x="5" y="2" width="14" height="20" rx="7"/></clipPath></defs>
          <rect x="5" y="2" width="14" height="20" rx="7"/>
          <line x1="12" y1="2" x2="12" y2="10"/>
          <line x1="5" y1="10" x2="19" y2="10"/>
          <rect x="12" y="2" width="7" height="8" fill="currentColor" opacity="0.3" stroke="none" clip-path="url(#rc6)"/>
        </svg>
        <span>Context</span>
      </button>
    </div>
  </div>

  <script>
    const tp = document.getElementById('trackpad');
    const cursor = document.getElementById('cursor');
    const cursorDot = document.getElementById('cursor-dot');

    function moveCursor(x, y) {
      cursor.style.left = x + 'px';
      cursor.style.top = y + 'px';
      cursorDot.style.left = x + 'px';
      cursorDot.style.top = y + 'px';
    }

    tp.addEventListener('mousemove', e => {
      const r = tp.getBoundingClientRect();
      moveCursor(e.clientX - r.left, e.clientY - r.top);
    });

    tp.addEventListener('mouseenter', () => tp.classList.add('active'));
    tp.addEventListener('mouseleave', () => tp.classList.remove('active'));

    function addRipple(x, y) {
      const d = document.createElement('div');
      d.className = 'ripple';
      d.style.left = x + 'px';
      d.style.top = y + 'px';
      tp.appendChild(d);
      d.addEventListener('animationend', () => d.remove());
    }

    tp.addEventListener('click', e => {
      const r = tp.getBoundingClientRect();
      addRipple(e.clientX - r.left, e.clientY - r.top);
    });

    tp.addEventListener('touchstart', e => {
      tp.classList.add('active');
      const r = tp.getBoundingClientRect();
      addRipple(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
    }, { passive: true });

    tp.addEventListener('touchend', () => tp.classList.remove('active'));

    function makeSlider(trackId, fillId, valId, readoutId, opts) {
      const track = document.getElementById(trackId);
      const fill = document.getElementById(fillId);
      const label = document.getElementById(valId);
      const readout = readoutId ? document.getElementById(readoutId) : null;
      let dragging = false;

      function getPct(clientY) {
        const r = track.getBoundingClientRect();
        return Math.max(0, Math.min(1, 1 - (clientY - r.top) / r.height));
      }

      function update(pct) {
        fill.style.height = (pct * 100) + '%';
        const val = opts.format(pct);
        label.textContent = val;
        if (readout) readout.textContent = val;
      }

      track.addEventListener('mousedown', e => { dragging = true; track.classList.add('dragging'); update(getPct(e.clientY)); });
      document.addEventListener('mousemove', e => { if (dragging) update(getPct(e.clientY)); });
      document.addEventListener('mouseup', () => { dragging = false; track.classList.remove('dragging'); });
      track.addEventListener('touchstart', e => { dragging = true; update(getPct(e.touches[0].clientY)); }, { passive: true });
      document.addEventListener('touchmove', e => { if (dragging) update(getPct(e.touches[0].clientY)); }, { passive: true });
      document.addEventListener('touchend', () => dragging = false);
    }

    makeSlider('vol-track', 'vol-fill', 'vol-val', 'r-vol', { format: p => Math.round(p * 100) });
    makeSlider('spd-track', 'spd-fill', 'spd-val', 'r-spd', { format: p => (0.5 + p * 4.5).toFixed(1) });

    document.querySelectorAll('.click-btn, #btn-power').forEach(btn => {
      btn.addEventListener('touchstart', () => btn.style.transform = 'scale(0.94)', { passive: true });
      btn.addEventListener('touchend', () => btn.style.transform = '');
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Ctrl — Concept 05: Ultra Minimal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --border: rgba(255,255,255,0.07);
      --border-hi: rgba(96,165,250,0.3);
      --text: #e4e4e7;
      --text-mid: #52525b;
      --text-dim: #3f3f46;
      --accent: #60a5fa;
      --accent-bg: rgba(96,165,250,0.08);
      --danger: #ef4444;
      --font: 'Sora', sans-serif;
    }

    html, body {
      height: 100%;
      background: #040406;
      color: var(--text);
      font-family: var(--font);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    .back-link {
      font-size: 11px;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent); }

    #phone {
      width: 390px;
      height: 844px;
      background: var(--bg);
      border-radius: 48px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02) inset,
        0 60px 120px rgba(0,0,0,0.8);
    }

    /* ── Header ─────────────────────────────────────── */
    #header {
      flex-shrink: 0;
      padding: 28px 28px 0;
    }

    #header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 40px;
    }

    #wordmark {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
    }

    #status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink-status 3s ease-in-out infinite;
    }

    @keyframes blink-status {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0.2; }
    }

    #status-label {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-mid);
      letter-spacing: 0.04em;
    }

    #btn-power {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: none;
      border: 1px solid var(--border);
      color: var(--danger);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      opacity: 0.6;
    }

    #btn-power:hover { opacity: 1; border-color: rgba(239,68,68,0.3); }
    #btn-power:active { opacity: 1; transform: scale(0.9); background: rgba(239,68,68,0.08); }

    /* ── Divider ─────────────────────────────────────── */
    .line {
      height: 1px;
      background: var(--border);
      margin: 20px 28px 0;
      flex-shrink: 0;
    }

    .line.accent {
      background: linear-gradient(to right, var(--accent), transparent);
      opacity: 0.4;
    }

    /* ── Trackpad — no card, defined by space ─────────── */
    #trackpad-area {
      flex: 1;
      padding: 20px 28px;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #trackpad-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    #trackpad-meta span {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #scroll-indicator {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    #trackpad {
      flex: 1;
      border-radius: 16px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      cursor: crosshair;
      transition: border-color 0.2s;
    }

    #trackpad:hover { border-color: rgba(255,255,255,0.1); }
    #trackpad.scroll-mode { border-color: rgba(96,165,250,0.2); }
    #trackpad.scroll-mode #scroll-indicator { opacity: 1; }

    #tp-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    #tp-hint p {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.06em;
    }

    #trackpad.active #tp-hint { opacity: 0; }

    /* Minimal cursor crosshair */
    #tp-h, #tp-v {
      position: absolute;
      background: rgba(96,165,250,0.15);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    #tp-h { height: 1px; left: 0; right: 0; transform: translateY(-50%); }
    #tp-v { width: 1px; top: 0; bottom: 0; transform: translateX(-50%); }

    #tp-dot {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }

    #trackpad.active #tp-h,
    #trackpad.active #tp-v,
    #trackpad.active #tp-dot {
      opacity: 1;
    }

    /* ── Sliders section ─────────────────────────────── */
    #sliders-section {
      flex-shrink: 0;
      padding: 16px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .s-icon {
      width: 16px;
      flex-shrink: 0;
      opacity: 0.35;
      display: flex;
      align-items: center;
    }

    .s-track {
      flex: 1;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      position: relative;
      cursor: ew-resize;
    }

    .s-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.04s;
    }

    .s-thumb {
      position: absolute;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--accent);
      transform: translate(-50%, -50%);
      transition: left 0.04s, width 0.15s, height 0.15s;
      pointer-events: none;
    }

    .s-track:active .s-thumb,
    .s-track.dragging .s-thumb {
      width: 16px;
      height: 16px;
    }

    .s-val {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-mid);
      width: 38px;
      text-align: right;
      flex-shrink: 0;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }

    /* ── Bottom click section ────────────────────────── */
    #click-section {
      flex-shrink: 0;
      padding: 0 28px 36px;
      display: flex;
      gap: 12px;
    }

    .click-btn {
      flex: 1;
      height: 56px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
      color: var(--text-mid);
    }

    .click-btn:hover {
      border-color: rgba(255,255,255,0.12);
      color: var(--text);
      background: rgba(255,255,255,0.02);
    }

    .click-btn:active {
      transform: scale(0.97);
      border-color: var(--border-hi);
      color: var(--accent);
      background: var(--accent-bg);
    }

    .click-btn span {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
    }

    .click-btn svg { opacity: 0.5; transition: opacity 0.15s; }
    .click-btn:hover svg, .click-btn:active svg { opacity: 0.9; }

    /* Separator between click buttons */
    .click-sep {
      width: 1px;
      background: var(--border);
      flex-shrink: 0;
      border-radius: 1px;
    }

    @media (max-width: 500px) {
      body { background: var(--bg); display: block; }
      #phone {
        width: 100%;
        height: 100dvh;
        border-radius: 0;
        border: none;
      }
      #click-section {
        padding-bottom: env(safe-area-inset-bottom, 36px);
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← All concepts</a>

  <div id="phone">
    <div id="header">
      <div id="header-row">
        <span id="wordmark">Ctrl</span>
        <div id="status-row">
          <div id="status-dot"></div>
          <span id="status-label">live</span>
        </div>
        <button id="btn-power" title="Sleep Mac">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
            <line x1="12" y1="2" x2="12" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="line accent"></div>

    <div id="trackpad-area">
      <div id="trackpad-meta">
        <span>Trackpad</span>
        <span id="scroll-indicator">Scroll mode</span>
      </div>

      <div id="trackpad">
        <div id="tp-hint"><p>drag to move · tap to click</p></div>
        <div id="tp-h"></div>
        <div id="tp-v"></div>
        <div id="tp-dot"></div>
      </div>
    </div>

    <div class="line"></div>

    <div id="sliders-section">
      <div class="slider-row">
        <span class="s-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </span>
        <div class="s-track" id="vol-track">
          <div class="s-fill" id="vol-fill" style="width:60%"></div>
          <div class="s-thumb" id="vol-thumb" style="left:60%"></div>
        </div>
        <span class="s-val" id="vol-val">60%</span>
      </div>

      <div class="slider-row">
        <span class="s-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </span>
        <div class="s-track" id="spd-track">
          <div class="s-fill" id="spd-fill" style="width:38%"></div>
          <div class="s-thumb" id="spd-thumb" style="left:38%"></div>
        </div>
        <span class="s-val" id="spd-val">2.2</span>
      </div>
    </div>

    <div class="line"></div>

    <div id="click-section">
      <button class="click-btn" id="btn-left">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <defs><clipPath id="lc5"><rect x="5" y="2" width="14" height="20" rx="7"/></clipPath></defs>
          <rect x="5" y="2" width="14" height="20" rx="7"/>
          <line x1="12" y1="2" x2="12" y2="10"/>
          <line x1="5" y1="10" x2="19" y2="10"/>
          <rect x="5" y="2" width="7" height="8" fill="currentColor" opacity="0.28" stroke="none" clip-path="url(#lc5)"/>
        </svg>
        <span>Left click</span>
      </button>
      <button class="click-btn" id="btn-right">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <defs><clipPath id="rc5"><rect x="5" y="2" width="14" height="20" rx="7"/></clipPath></defs>
          <rect x="5" y="2" width="14" height="20" rx="7"/>
          <line x1="12" y1="2" x2="12" y2="10"/>
          <line x1="5" y1="10" x2="19" y2="10"/>
          <rect x="12" y="2" width="7" height="8" fill="currentColor" opacity="0.28" stroke="none" clip-path="url(#rc5)"/>
        </svg>
        <span>Right click</span>
      </button>
    </div>
  </div>

  <script>
    // ── Trackpad ─────────────────────────────────────
    const tp    = document.getElementById('trackpad');
    const tpH   = document.getElementById('tp-h');
    const tpV   = document.getElementById('tp-v');
    const tpDot = document.getElementById('tp-dot');

    tp.addEventListener('mousemove', e => {
      const r = tp.getBoundingClientRect();
      const x = e.clientX - r.left;
      const y = e.clientY - r.top;
      tpH.style.top  = y + 'px';
      tpV.style.left = x + 'px';
      tpDot.style.left = x + 'px';
      tpDot.style.top  = y + 'px';
    });

    tp.addEventListener('mouseenter', () => tp.classList.add('active'));
    tp.addEventListener('mouseleave', () => tp.classList.remove('active'));

    let touchCount = 0;
    tp.addEventListener('touchstart', e => {
      tp.classList.add('active');
      touchCount = e.touches.length;
      if (touchCount >= 2) tp.classList.add('scroll-mode');
      const r = tp.getBoundingClientRect();
      tpDot.style.left = (e.touches[0].clientX - r.left) + 'px';
      tpDot.style.top  = (e.touches[0].clientY - r.top) + 'px';
    }, { passive: true });

    tp.addEventListener('touchmove', e => {
      const r = tp.getBoundingClientRect();
      const x = e.touches[0].clientX - r.left;
      const y = e.touches[0].clientY - r.top;
      tpH.style.top  = y + 'px';
      tpV.style.left = x + 'px';
      tpDot.style.left = x + 'px';
      tpDot.style.top  = y + 'px';
    }, { passive: true });

    tp.addEventListener('touchend', e => {
      if (e.touches.length === 0) {
        tp.classList.remove('active', 'scroll-mode');
      }
    });

    // ── Horizontal sliders ────────────────────────────
    function makeHSlider(trackId, fillId, thumbId, valId, opts) {
      const track = document.getElementById(trackId);
      const fill  = document.getElementById(fillId);
      const thumb = document.getElementById(thumbId);
      const label = document.getElementById(valId);
      let dragging = false;

      function getPct(clientX) {
        const r = track.getBoundingClientRect();
        return Math.max(0, Math.min(1, (clientX - r.left) / r.width));
      }

      function update(pct) {
        const p = (pct * 100) + '%';
        fill.style.width  = p;
        thumb.style.left  = p;
        label.textContent = opts.format(pct);
      }

      track.addEventListener('mousedown', e => {
        dragging = true;
        track.classList.add('dragging');
        update(getPct(e.clientX));
      });
      document.addEventListener('mousemove', e => { if (dragging) update(getPct(e.clientX)); });
      document.addEventListener('mouseup', () => { dragging = false; track.classList.remove('dragging'); });

      track.addEventListener('touchstart', e => {
        dragging = true;
        update(getPct(e.touches[0].clientX));
      }, { passive: true });
      document.addEventListener('touchmove', e => { if (dragging) update(getPct(e.touches[0].clientX)); }, { passive: true });
      document.addEventListener('touchend', () => dragging = false);
    }

    makeHSlider('vol-track', 'vol-fill', 'vol-thumb', 'vol-val', {
      format: p => Math.round(p * 100) + '%'
    });
    makeHSlider('spd-track', 'spd-fill', 'spd-thumb', 'spd-val', {
      format: p => (0.5 + p * 4.5).toFixed(1)
    });

    // ── Button feedback ───────────────────────────────
    document.querySelectorAll('.click-btn, #btn-power').forEach(btn => {
      btn.addEventListener('touchstart', () => btn.style.transform = 'scale(0.96)', { passive: true });
      btn.addEventListener('touchend', () => btn.style.transform = '');
    });
  </script>
</body>
</html>

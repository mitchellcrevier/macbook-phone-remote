<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Neon — Concept 08: Synthwave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080412;
      --bg2: #0e0820;
      --surface: rgba(255,0,200,0.04);
      --surface-hi: rgba(255,0,200,0.09);
      --border: rgba(255,0,200,0.14);
      --border-hi: rgba(255,0,200,0.4);
      --text: #f0e6ff;
      --text-mid: #9070c0;
      --text-dim: #3d2860;
      --pink: #ff2d9b;
      --cyan: #00f5ff;
      --yellow: #ffe04b;
      --pink-bg: rgba(255,45,155,0.08);
      --cyan-bg: rgba(0,245,255,0.06);
      --r: 6px;
      --font: 'Rajdhani', sans-serif;
      --mono: 'Share Tech Mono', monospace;
    }

    html, body {
      height: 100%;
      background: #040210;
      color: var(--text);
      font-family: var(--font);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    .back-link {
      font-size: 11px;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.1em;
      font-family: var(--mono);
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--pink); }

    #phone {
      width: 390px;
      height: 844px;
      background: var(--bg);
      border-radius: 48px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 22px 18px 32px;
      gap: 12px;
      position: relative;
      border: 1px solid rgba(255,45,155,0.18);
      box-shadow:
        0 0 0 1px rgba(255,45,155,0.04) inset,
        0 60px 120px rgba(0,0,0,0.95),
        0 0 60px rgba(255,45,155,0.08),
        0 0 120px rgba(0,245,255,0.04);
    }

    /* Scanline overlay */
    #phone::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Ambient glow */
    #phone::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 10%, rgba(255,45,155,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(0,245,255,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      height: 44px;
      position: relative;
      z-index: 2;
    }

    #wordmark {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--pink);
      text-shadow: 0 0 16px rgba(255,45,155,0.6), 0 0 40px rgba(255,45,155,0.2);
      font-family: var(--font);
    }

    #status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,245,255,0.06);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 3px;
      padding: 5px 12px 5px 8px;
    }

    #status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      animation: blink 1.4s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #status-text {
      font-size: 9px;
      font-weight: 400;
      color: var(--cyan);
      font-family: var(--mono);
      letter-spacing: 0.1em;
      text-shadow: 0 0 8px rgba(0,245,255,0.5);
    }

    #btn-power {
      width: 38px;
      height: 38px;
      border-radius: var(--r);
      background: rgba(255,45,155,0.07);
      border: 1px solid rgba(255,45,155,0.2);
      color: var(--pink);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.18s;
      touch-action: manipulation;
    }

    #btn-power:active {
      background: rgba(255,45,155,0.2);
      transform: scale(0.92);
      box-shadow: 0 0 12px rgba(255,45,155,0.4);
    }

    /* Grid divider */
    .neon-rule {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,45,155,0.3) 30%, rgba(0,245,255,0.3) 70%, transparent 100%);
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    #main {
      flex: 1;
      display: flex;
      gap: 10px;
      min-height: 0;
      position: relative;
      z-index: 2;
    }

    #sliders {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 50px;
      flex-shrink: 0;
    }

    .pill-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .pill-label {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    .pill-track {
      flex: 1;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      position: relative;
      overflow: hidden;
      cursor: ns-resize;
      transition: border-color 0.2s;
    }

    .pill-track:hover { border-color: var(--border-hi); }
    .pill-track.dragging { border-color: var(--pink); box-shadow: 0 0 10px rgba(255,45,155,0.2); }

    .pill-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      transition: height 0.04s ease-out;
    }

    .pill-fill-vol {
      background: linear-gradient(to top,
        rgba(255,45,155,0.6) 0%,
        rgba(255,45,155,0.15) 60%,
        transparent 100%);
      box-shadow: 0 0 20px rgba(255,45,155,0.3);
    }

    .pill-fill-spd {
      background: linear-gradient(to top,
        rgba(0,245,255,0.5) 0%,
        rgba(0,245,255,0.1) 60%,
        transparent 100%);
    }

    .pill-val {
      position: absolute;
      bottom: 8px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 8px;
      color: rgba(255,255,255,0.3);
      font-family: var(--mono);
      z-index: 2;
      pointer-events: none;
    }

    #trackpad {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      position: relative;
      overflow: hidden;
      cursor: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #trackpad.active {
      border-color: rgba(255,45,155,0.25);
      box-shadow: 0 0 20px rgba(255,45,155,0.06) inset;
    }

    /* Perspective grid */
    #trackpad::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,45,155,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.05) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    #tp-hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1;
    }

    #tp-hint svg { opacity: 0.08; }

    #tp-hint span {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    #trackpad.active #tp-hint { opacity: 0; }

    #cursor {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 1px;
      border: 1.5px solid var(--pink);
      transform: translate(-50%, -50%) scale(0) rotate(45deg);
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      box-shadow: 0 0 10px rgba(255,45,155,0.5);
    }

    #trackpad.active #cursor {
      transform: translate(-50%, -50%) scale(1) rotate(45deg);
      opacity: 1;
    }

    .ripple {
      position: absolute;
      border-radius: 1px;
      border: 1px solid rgba(255,45,155,0.5);
      width: 56px;
      height: 56px;
      margin-left: -28px;
      margin-top: -28px;
      animation: ripple-out 0.5s ease-out forwards;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes ripple-out {
      from { transform: scale(0.2) rotate(45deg); opacity: 1; }
      to { transform: scale(3) rotate(45deg); opacity: 0; }
    }

    #click-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex-shrink: 0;
      height: 78px;
      position: relative;
      z-index: 2;
    }

    .click-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 0.15s;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    .click-btn::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--pink) 50%, transparent 100%);
      opacity: 0.4;
    }

    .click-btn:hover { background: var(--surface-hi); border-color: var(--border-hi); }
    .click-btn:active { transform: scale(0.95); box-shadow: 0 0 16px rgba(255,45,155,0.2); }

    .click-btn span {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    .click-btn svg { opacity: 0.4; transition: opacity 0.15s; }
    .click-btn:hover svg, .click-btn:active svg { opacity: 0.7; }

    @media (max-width: 500px) {
      body { background: var(--bg); padding: 0; display: block; }
      #phone { width: 100%; height: 100dvh; border-radius: 0; border: none; box-shadow: none; padding: 20px 16px env(safe-area-inset-bottom, 28px); }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← All concepts</a>

  <div id="phone">
    <div id="topbar">
      <span id="wordmark">NEON</span>
      <div id="status-pill">
        <div id="status-dot"></div>
        <span id="status-text">ONLINE</span>
      </div>
      <button id="btn-power" title="Sleep Mac">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="neon-rule"></div>

    <div id="main">
      <div id="sliders">
        <div class="pill-wrap">
          <span class="pill-label">Vol</span>
          <div class="pill-track" id="vol-track">
            <div class="pill-fill pill-fill-vol" id="vol-fill" style="height:60%"></div>
            <span class="pill-val" id="vol-val">60%</span>
          </div>
        </div>

        <div class="pill-wrap">
          <span class="pill-label">Spd</span>
          <div class="pill-track" id="spd-track">
            <div class="pill-fill pill-fill-spd" id="spd-fill" style="height:42%"></div>
            <span class="pill-val" id="spd-val">2.2</span>
          </div>
        </div>
      </div>

      <div id="trackpad">
        <div id="tp-hint">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round">
            <rect x="5" y="2" width="14" height="20" rx="7"/>
            <line x1="12" y1="2" x2="12" y2="9"/>
          </svg>
          <span>Touch interface</span>
        </div>
        <div id="cursor"></div>
      </div>
    </div>

    <div class="neon-rule"></div>

    <div id="click-row">
      <button class="click-btn" id="btn-left">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <defs><clipPath id="lc8"><rect x="5" y="2" width="14" height="20" rx="7"/></clipPath></defs>
          <rect x="5" y="2" width="14" height="20" rx="7"/>
          <line x1="12" y1="2" x2="12" y2="10"/>
          <line x1="5" y1="10" x2="19" y2="10"/>
          <rect x="5" y="2" width="7" height="8" fill="currentColor" opacity="0.3" stroke="none" clip-path="url(#lc8)"/>
        </svg>
        <span>Left</span>
      </button>
      <button class="click-btn" id="btn-right">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <defs><clipPath id="rc8"><rect x="5" y="2" width="14" height="20" rx="7"/></clipPath></defs>
          <rect x="5" y="2" width="14" height="20" rx="7"/>
          <line x1="12" y1="2" x2="12" y2="10"/>
          <line x1="5" y1="10" x2="19" y2="10"/>
          <rect x="12" y="2" width="7" height="8" fill="currentColor" opacity="0.3" stroke="none" clip-path="url(#rc8)"/>
        </svg>
        <span>Right</span>
      </button>
    </div>
  </div>

  <script>
    const tp = document.getElementById('trackpad');
    const cursor = document.getElementById('cursor');

    tp.addEventListener('mousemove', e => {
      const r = tp.getBoundingClientRect();
      cursor.style.left = (e.clientX - r.left) + 'px';
      cursor.style.top = (e.clientY - r.top) + 'px';
    });

    tp.addEventListener('mouseenter', () => tp.classList.add('active'));
    tp.addEventListener('mouseleave', () => tp.classList.remove('active'));

    function addRipple(x, y) {
      const d = document.createElement('div');
      d.className = 'ripple';
      d.style.left = x + 'px';
      d.style.top = y + 'px';
      tp.appendChild(d);
      d.addEventListener('animationend', () => d.remove());
    }

    tp.addEventListener('click', e => {
      const r = tp.getBoundingClientRect();
      addRipple(e.clientX - r.left, e.clientY - r.top);
    });

    tp.addEventListener('touchstart', e => {
      tp.classList.add('active');
      const r = tp.getBoundingClientRect();
      addRipple(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
    }, { passive: true });

    tp.addEventListener('touchend', () => tp.classList.remove('active'));

    function makeSlider(trackId, fillId, valId, opts) {
      const track = document.getElementById(trackId);
      const fill = document.getElementById(fillId);
      const label = document.getElementById(valId);
      let dragging = false;

      function getPct(clientY) {
        const r = track.getBoundingClientRect();
        return Math.max(0, Math.min(1, 1 - (clientY - r.top) / r.height));
      }

      function update(pct) {
        fill.style.height = (pct * 100) + '%';
        label.textContent = opts.format(pct);
      }

      track.addEventListener('mousedown', e => { dragging = true; track.classList.add('dragging'); update(getPct(e.clientY)); });
      document.addEventListener('mousemove', e => { if (dragging) update(getPct(e.clientY)); });
      document.addEventListener('mouseup', () => { dragging = false; track.classList.remove('dragging'); });
      track.addEventListener('touchstart', e => { dragging = true; update(getPct(e.touches[0].clientY)); }, { passive: true });
      document.addEventListener('touchmove', e => { if (dragging) update(getPct(e.touches[0].clientY)); }, { passive: true });
      document.addEventListener('touchend', () => dragging = false);
    }

    makeSlider('vol-track', 'vol-fill', 'vol-val', { format: p => Math.round(p * 100) + '%' });
    makeSlider('spd-track', 'spd-fill', 'spd-val', { format: p => (0.5 + p * 4.5).toFixed(1) });

    document.querySelectorAll('.click-btn, #btn-power').forEach(btn => {
      btn.addEventListener('touchstart', () => btn.style.transform = 'scale(0.94)', { passive: true });
      btn.addEventListener('touchend', () => btn.style.transform = '');
    });
  </script>
</body>
</html>

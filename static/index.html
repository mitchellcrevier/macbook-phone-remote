<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mac Remote</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #181818;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-dim: #555;
      --accent: #3b82f6;
      --danger: #ef4444;
      --btn-bg: #1e1e1e;
      --btn-active: #2a2a2a;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: 12px 12px 24px;
      gap: 10px;
    }

    /* Status bar */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
      height: 28px;
      flex-shrink: 0;
    }

    #status-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #status-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }

    #status-dot.connected { background: #22c55e; }
    #status-dot.disconnected { background: var(--danger); }

    #btn-reconnect {
      display: none;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: none;
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #status-dot.disconnected ~ #btn-reconnect,
    .show-reconnect #btn-reconnect { display: block; }

    /* Speed control */
    #speed-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      padding: 0 4px;
    }

    #speed-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      min-width: 42px;
    }

    #speed-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }

    #speed-val {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 24px;
      text-align: right;
    }

    /* Volume control */
    #volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      padding: 0 4px;
    }

    #volume-row svg { opacity: 0.4; flex-shrink: 0; }

    #volume-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }

    #volume-val {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 32px;
      text-align: right;
    }

    /* Trackpad */
    #trackpad {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
      cursor: none;
    }

    #trackpad::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at center, rgba(255,255,255,0.025) 0%, transparent 70%);
      pointer-events: none;
    }

    #trackpad-hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #trackpad-hint svg {
      opacity: 0.12;
      width: 36px;
      height: 36px;
    }

    #trackpad-hint span {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .trackpad-active #trackpad-hint { opacity: 0; }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      width: 60px;
      height: 60px;
      margin-left: -30px;
      margin-top: -30px;
      animation: ripple-out 0.4s ease-out forwards;
      pointer-events: none;
    }

    @keyframes ripple-out {
      from { transform: scale(0); opacity: 1; }
      to   { transform: scale(2.5); opacity: 0; }
    }

    /* Scroll mode overlay */
    #scroll-badge {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .scroll-mode #scroll-badge { opacity: 1; }

    /* Button row */
    #buttons {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      flex-shrink: 0;
      height: 72px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--btn-bg);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, transform 0.1s, border-color 0.1s;
      touch-action: manipulation;
    }

    .btn:active, .btn.pressing {
      background: var(--btn-active);
      transform: scale(0.96);
    }

    .btn svg { opacity: 0.55; flex-shrink: 0; }

    #btn-sleep {
      width: 72px;
      flex-direction: column;
      gap: 5px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      border-color: var(--border);
    }

    #btn-sleep svg { opacity: 0.35; }
    #btn-sleep:active, #btn-sleep.pressing { border-color: var(--danger); color: var(--danger); }
    #btn-sleep:active svg, #btn-sleep.pressing svg { opacity: 0.7; }
  </style>
</head>
<body>
  <div id="app">
    <div id="status-bar">
      <span id="status-label">Mac Remote</span>
      <div id="status-right">
        <div id="status-dot"></div>
        <button id="btn-reconnect">Reconnect</button>
      </div>
    </div>

    <div id="speed-row">
      <span id="speed-label">Speed</span>
      <input id="speed-slider" type="range" min="0.5" max="5" step="0.1" value="2.2" />
      <span id="speed-val">2.2</span>
    </div>

    <div id="volume-row">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <input id="volume-slider" type="range" min="0" max="100" step="1" value="50" />
      <span id="volume-val">50%</span>
    </div>

    <div id="trackpad">
      <div id="trackpad-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 11V6a3 3 0 0 1 6 0v5"/>
          <path d="M5 11h14l-1.5 9h-11L5 11z"/>
        </svg>
        <span>Tap to click &bull; Drag to move &bull; 2-finger scroll</span>
      </div>
      <div id="scroll-badge">Scroll</div>
    </div>

    <div id="buttons">
      <button class="btn" id="btn-left">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <line x1="12" y1="3" x2="12" y2="21"/>
        </svg>
        Left Click
      </button>

      <button class="btn" id="btn-sleep">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          <circle cx="12" cy="12" r="5"/>
        </svg>
        Sleep
      </button>

      <button class="btn" id="btn-right">
        Right Click
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <line x1="12" y1="3" x2="12" y2="21"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const socket = io({ transports: ['websocket'] });

    const dot = document.getElementById('status-dot');
    const trackpad = document.getElementById('trackpad');
    const speedSlider = document.getElementById('speed-slider');
    const speedVal = document.getElementById('speed-val');

    let sensitivity = parseFloat(speedSlider.value);

    speedSlider.addEventListener('input', () => {
      sensitivity = parseFloat(speedSlider.value);
      speedVal.textContent = sensitivity.toFixed(1);
    });

    const reconnectBtn = document.getElementById('btn-reconnect');

    socket.on('connect', () => {
      dot.className = 'connected';
      reconnectBtn.style.display = 'none';
    });
    socket.on('disconnect', () => {
      dot.className = 'disconnected';
      reconnectBtn.style.display = 'block';
    });

    reconnectBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      reconnectBtn.textContent = '...';
      socket.connect();
    });

    // Volume
    const volumeSlider = document.getElementById('volume-slider');
    const volumeVal = document.getElementById('volume-val');
    let volumeTimer = null;

    fetch('/volume').then(r => r.json()).then(d => {
      volumeSlider.value = d.level;
      volumeVal.textContent = d.level + '%';
    }).catch(() => {});

    volumeSlider.addEventListener('input', () => {
      const level = parseInt(volumeSlider.value);
      volumeVal.textContent = level + '%';
      clearTimeout(volumeTimer);
      volumeTimer = setTimeout(() => socket.emit('volume', { level }), 80);
    });

    // Trackpad movement
    let lastX = null, lastY = null;
    let startX = null, startY = null;
    let hasMoved = false;
    let isScrolling = false;
    const TAP_THRESHOLD = 8; // px — less than this = tap, not drag

    function addRipple(x, y) {
      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.left = x + 'px';
      r.style.top = y + 'px';
      trackpad.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    }

    trackpad.addEventListener('touchstart', (e) => {
      e.preventDefault();
      isScrolling = e.touches.length >= 2;
      hasMoved = false;

      const t = e.touches[0];
      lastX = startX = t.clientX;
      lastY = startY = t.clientY;

      if (isScrolling) {
        trackpad.classList.add('scroll-mode');
      } else {
        const rect = trackpad.getBoundingClientRect();
        addRipple(t.clientX - rect.left, t.clientY - rect.top);
      }

      trackpad.classList.add('trackpad-active');
    }, { passive: false });

    trackpad.addEventListener('touchmove', (e) => {
      e.preventDefault();

      if (e.touches.length >= 2 || isScrolling) {
        trackpad.classList.add('scroll-mode');
        isScrolling = true;
        hasMoved = true;
        const t = e.touches[0];
        const dx = (t.clientX - lastX) * sensitivity * 0.4;
        const dy = (t.clientY - lastY) * sensitivity * 0.4;
        socket.emit('scroll', { dx, dy });
        lastX = t.clientX;
        lastY = t.clientY;
        return;
      }

      const t = e.touches[0];
      const totalDx = t.clientX - startX;
      const totalDy = t.clientY - startY;
      if (Math.abs(totalDx) > TAP_THRESHOLD || Math.abs(totalDy) > TAP_THRESHOLD) {
        hasMoved = true;
      }

      const dx = (t.clientX - lastX) * sensitivity;
      const dy = (t.clientY - lastY) * sensitivity;
      if (Math.abs(dx) > 0.1 || Math.abs(dy) > 0.1) {
        socket.emit('mousemove', { dx: Math.round(dx), dy: Math.round(dy) });
      }

      lastX = t.clientX;
      lastY = t.clientY;
    }, { passive: false });

    trackpad.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (e.touches.length === 0) {
        if (!hasMoved && !isScrolling) {
          socket.emit('leftclick');
          navigator.vibrate?.(8);
        }
        lastX = lastY = startX = startY = null;
        hasMoved = false;
        isScrolling = false;
        trackpad.classList.remove('trackpad-active', 'scroll-mode');
      }
    }, { passive: false });

    // Buttons
    function pressBtn(el, event) {
      el.classList.add('pressing');
      socket.emit(event);
      navigator.vibrate?.(8);
      setTimeout(() => el.classList.remove('pressing'), 150);
    }

    document.getElementById('btn-left').addEventListener('touchstart', (e) => {
      e.preventDefault();
      pressBtn(e.currentTarget, 'leftclick');
    });

    document.getElementById('btn-right').addEventListener('touchstart', (e) => {
      e.preventDefault();
      pressBtn(e.currentTarget, 'rightclick');
    });

    document.getElementById('btn-sleep').addEventListener('touchstart', (e) => {
      e.preventDefault();
      pressBtn(e.currentTarget, 'sleep');
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mac Remote</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #181818;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-dim: #555;
      --accent: #3b82f6;
      --danger: #ef4444;
      --btn-bg: #1e1e1e;
      --btn-active: #2a2a2a;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: 12px 12px 24px;
      gap: 10px;
    }

    /* ── Status bar ─────────────────────────────────────── */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
      height: 36px;
      flex-shrink: 0;
    }

    #status-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }

    #status-dot.connected  { background: #22c55e; }
    #status-dot.disconnected { background: var(--danger); }

    #status-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #btn-reconnect {
      display: none;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: none;
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Power button */
    #btn-power {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.12);
      border: 1.5px solid rgba(239, 68, 68, 0.35);
      color: var(--danger);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    #btn-power:active, #btn-power.pressing {
      background: rgba(239, 68, 68, 0.28);
      border-color: var(--danger);
      transform: scale(0.93);
    }

    /* ── Main section: sliders + trackpad ───────────────── */
    #main-section {
      flex: 1;
      display: flex;
      flex-direction: row;
      gap: 10px;
      min-height: 0;
    }

    /* Vertical pill sliders */
    #side-sliders {
      display: flex;
      flex-direction: row;
      gap: 8px;
      flex-shrink: 0;
      width: 96px;
    }

    .pill-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .pill-label {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .pill-slider {
      flex: 1;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    .pill-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 22px;
      transition: height 0.06s ease-out;
    }

    .pill-icon {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0.3;
      z-index: 2;
      pointer-events: none;
    }

    .pill-val {
      position: absolute;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.02em;
      z-index: 2;
      pointer-events: none;
    }

    /* ── Trackpad ────────────────────────────────────────── */
    #trackpad {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
      cursor: none;
    }

    #trackpad::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at center, rgba(255,255,255,0.025) 0%, transparent 70%);
      pointer-events: none;
    }

    #trackpad-hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #trackpad-hint span {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1;
    }

    .trackpad-active #trackpad-hint { opacity: 0; }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      width: 60px;
      height: 60px;
      margin-left: -30px;
      margin-top: -30px;
      animation: ripple-out 0.4s ease-out forwards;
      pointer-events: none;
    }

    @keyframes ripple-out {
      from { transform: scale(0); opacity: 1; }
      to   { transform: scale(2.5); opacity: 0; }
    }

    /* Scroll mode overlay */
    #scroll-badge {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .scroll-mode #scroll-badge { opacity: 1; }

    /* ── Button row ──────────────────────────────────────── */
    #buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex-shrink: 0;
      height: 72px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--btn-bg);
      color: var(--text);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, transform 0.1s, border-color 0.1s;
      touch-action: manipulation;
    }

    .btn:active, .btn.pressing {
      background: var(--btn-active);
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <div id="app">

    <div id="status-bar">
      <div id="status-left">
        <div id="status-dot"></div>
        <span id="status-label">Mac Remote</span>
        <button id="btn-reconnect">Reconnect</button>
      </div>
      <button id="btn-power">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </button>
    </div>

    <div id="main-section">

      <div id="side-sliders">
        <!-- Speed -->
        <div class="pill-wrap">
          <span class="pill-label">Spd</span>
          <div class="pill-slider" id="speed-pill">
            <div class="pill-fill" id="speed-fill"></div>
            <svg class="pill-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
            <span class="pill-val" id="speed-val">2.2</span>
          </div>
        </div>

        <!-- Volume -->
        <div class="pill-wrap">
          <span class="pill-label">Vol</span>
          <div class="pill-slider" id="volume-pill">
            <div class="pill-fill" id="volume-fill"></div>
            <svg class="pill-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            <span class="pill-val" id="volume-val">50%</span>
          </div>
        </div>
      </div>

      <div id="trackpad">
        <div id="trackpad-hint">
          <span>Tap to click</span>
          <span>Drag to move</span>
          <span>Two finger scroll</span>
        </div>
        <div id="scroll-badge">Scroll</div>
      </div>

    </div>

    <div id="buttons">
      <!-- Left click -->
      <button class="btn" id="btn-left">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <clipPath id="mc-l"><rect x="5" y="2" width="14" height="20" rx="7"/></clipPath>
          </defs>
          <rect x="5" y="2" width="14" height="20" rx="7"/>
          <line x1="12" y1="2" x2="12" y2="10"/>
          <line x1="5" y1="10" x2="19" y2="10"/>
          <rect x="5" y="2" width="7" height="8" fill="currentColor" opacity="0.35" stroke="none" clip-path="url(#mc-l)"/>
          <circle cx="12" cy="6" r="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
        </svg>
      </button>

      <!-- Right click -->
      <button class="btn" id="btn-right">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <clipPath id="mc-r"><rect x="5" y="2" width="14" height="20" rx="7"/></clipPath>
          </defs>
          <rect x="5" y="2" width="14" height="20" rx="7"/>
          <line x1="12" y1="2" x2="12" y2="10"/>
          <line x1="5" y1="10" x2="19" y2="10"/>
          <rect x="12" y="2" width="7" height="8" fill="currentColor" opacity="0.35" stroke="none" clip-path="url(#mc-r)"/>
          <circle cx="12" cy="6" r="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
        </svg>
      </button>
    </div>

  </div>

  <script>
    const socket = io({ transports: ['websocket'] });

    const dot = document.getElementById('status-dot');
    const trackpad = document.getElementById('trackpad');
    const reconnectBtn = document.getElementById('btn-reconnect');

    socket.on('connect', () => {
      dot.className = 'connected';
      reconnectBtn.style.display = 'none';
    });
    socket.on('disconnect', () => {
      dot.className = 'disconnected';
      reconnectBtn.style.display = 'block';
    });

    reconnectBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      reconnectBtn.textContent = '...';
      socket.connect();
    });

    // ── Power button ─────────────────────────────────────────
    const powerBtn = document.getElementById('btn-power');
    powerBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      powerBtn.classList.add('pressing');
      socket.emit('sleep');
      navigator.vibrate?.(12);
      setTimeout(() => powerBtn.classList.remove('pressing'), 200);
    });

    // ── Pill sliders ─────────────────────────────────────────
    const SPEED_MIN = 0.5, SPEED_MAX = 5.0;
    let sensitivity = 2.2;

    function makePillSlider(pillId, fillId, valId, { toValue, toPct, format, onCommit }) {
      const pill = document.getElementById(pillId);
      const fill = document.getElementById(fillId);
      const label = document.getElementById(valId);
      let timer = null;

      function setPct(pct) {
        pct = Math.max(0, Math.min(1, pct));
        fill.style.height = (pct * 100) + '%';
        const val = toValue(pct);
        label.textContent = format(val);
        clearTimeout(timer);
        timer = setTimeout(() => onCommit(val), 60);
      }

      function pctFromTouch(e) {
        const rect = pill.getBoundingClientRect();
        return 1 - (e.touches[0].clientY - rect.top) / rect.height;
      }

      pill.addEventListener('touchstart', (e) => { e.preventDefault(); setPct(pctFromTouch(e)); }, { passive: false });
      pill.addEventListener('touchmove',  (e) => { e.preventDefault(); setPct(pctFromTouch(e)); }, { passive: false });

      fill.style.height = (toPct() * 100) + '%';
    }

    makePillSlider('speed-pill', 'speed-fill', 'speed-val', {
      toValue: (p) => SPEED_MIN + p * (SPEED_MAX - SPEED_MIN),
      toPct:   ()  => (sensitivity - SPEED_MIN) / (SPEED_MAX - SPEED_MIN),
      format:  (v) => v.toFixed(1),
      onCommit:(v) => { sensitivity = v; },
    });

    let currentVolume = 50;
    makePillSlider('volume-pill', 'volume-fill', 'volume-val', {
      toValue: (p) => Math.round(p * 100),
      toPct:   ()  => currentVolume / 100,
      format:  (v) => v + '%',
      onCommit:(v) => { currentVolume = v; socket.emit('volume', { level: v }); },
    });

    fetch('/volume').then(r => r.json()).then(d => {
      currentVolume = d.level;
      document.getElementById('volume-fill').style.height = d.level + '%';
      document.getElementById('volume-val').textContent = d.level + '%';
    }).catch(() => {});

    // ── Trackpad ─────────────────────────────────────────────
    let lastX = null, lastY = null, startX = null, startY = null;
    let hasMoved = false, isScrolling = false;
    const TAP_THRESHOLD = 8;

    function addRipple(x, y) {
      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.left = x + 'px';
      r.style.top = y + 'px';
      trackpad.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    }

    trackpad.addEventListener('touchstart', (e) => {
      e.preventDefault();
      isScrolling = e.touches.length >= 2;
      hasMoved = false;
      const t = e.touches[0];
      lastX = startX = t.clientX;
      lastY = startY = t.clientY;
      if (isScrolling) {
        trackpad.classList.add('scroll-mode');
      } else {
        const rect = trackpad.getBoundingClientRect();
        addRipple(t.clientX - rect.left, t.clientY - rect.top);
      }
      trackpad.classList.add('trackpad-active');
    }, { passive: false });

    trackpad.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (e.touches.length >= 2 || isScrolling) {
        trackpad.classList.add('scroll-mode');
        isScrolling = true;
        hasMoved = true;
        const t = e.touches[0];
        const dx = (t.clientX - lastX) * sensitivity * 0.4;
        const dy = (t.clientY - lastY) * sensitivity * 0.4;
        socket.emit('scroll', { dx, dy });
        lastX = t.clientX;
        lastY = t.clientY;
        return;
      }
      const t = e.touches[0];
      if (Math.abs(t.clientX - startX) > TAP_THRESHOLD || Math.abs(t.clientY - startY) > TAP_THRESHOLD) hasMoved = true;
      const dx = (t.clientX - lastX) * sensitivity;
      const dy = (t.clientY - lastY) * sensitivity;
      if (Math.abs(dx) > 0.1 || Math.abs(dy) > 0.1) socket.emit('mousemove', { dx: Math.round(dx), dy: Math.round(dy) });
      lastX = t.clientX;
      lastY = t.clientY;
    }, { passive: false });

    trackpad.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (e.touches.length === 0) {
        if (!hasMoved && !isScrolling) { socket.emit('leftclick'); navigator.vibrate?.(8); }
        lastX = lastY = startX = startY = null;
        hasMoved = false;
        isScrolling = false;
        trackpad.classList.remove('trackpad-active', 'scroll-mode');
      }
    }, { passive: false });

    // ── Click buttons ─────────────────────────────────────────
    function pressBtn(el, event) {
      el.classList.add('pressing');
      socket.emit(event);
      navigator.vibrate?.(8);
      setTimeout(() => el.classList.remove('pressing'), 150);
    }

    document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); pressBtn(e.currentTarget, 'leftclick'); });
    document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); pressBtn(e.currentTarget, 'rightclick'); });
  </script>
</body>
</html>

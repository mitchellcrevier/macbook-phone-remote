<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mac Remote</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style id="theme-style"></style>
  <style>
    /* Settings panel — fixed, never replaced */
    #settings-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 900;
      pointer-events: none; transition: background 0.3s;
    }
    #settings-overlay.open {
      background: rgba(0,0,0,0.65); pointer-events: auto;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    #settings-sheet {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: #111113; border-radius: 24px 24px 0 0;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 10px 16px max(24px, env(safe-area-inset-bottom, 24px));
      display: flex; flex-direction: column; gap: 14px;
      max-height: 86dvh;
      transform: translateY(100%);
      transition: transform 0.44s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 -32px 80px rgba(0,0,0,0.7);
      will-change: transform;
    }
    #settings-overlay.open #settings-sheet { transform: translateY(0); }
    #settings-drag-handle {
      width: 36px; height: 4px; background: rgba(255,255,255,0.13);
      border-radius: 2px; margin: 4px auto 0; flex-shrink: 0;
    }
    #settings-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; padding: 0 2px;
    }
    #settings-title {
      font-size: 17px; font-weight: 600; color: #f4f4f5; letter-spacing: -0.015em;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }
    #btn-settings-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,0.09); border: none;
      color: rgba(255,255,255,0.45); display: flex; align-items: center;
      justify-content: center; cursor: pointer; touch-action: manipulation;
      transition: background 0.15s; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-settings-close:active { background: rgba(255,255,255,0.16); }
    #theme-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      overflow-y: auto; overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch; padding-bottom: 2px;
    }
    .theme-card {
      border: 1.5px solid rgba(255,255,255,0.07); border-radius: 16px;
      overflow: hidden; cursor: pointer; touch-action: manipulation;
      background: #1c1c1e;
      transition: border-color 0.22s, box-shadow 0.22s, transform 0.15s cubic-bezier(0.16,1,0.3,1);
      -webkit-tap-highlight-color: transparent; position: relative;
    }
    .theme-card:active { transform: scale(0.95); }
    .theme-card.active {
      border-color: var(--card-accent, rgba(255,255,255,0.4));
      box-shadow: 0 0 0 1px var(--card-accent, rgba(255,255,255,0.4));
    }
    .theme-card-preview {
      height: 76px; position: relative; display: flex;
      align-items: center; justify-content: center; overflow: hidden;
    }
    .theme-card-check {
      position: absolute; top: 8px; right: 8px; width: 19px; height: 19px;
      border-radius: 50%; background: rgba(0,0,0,0.48);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.6);
      transition: opacity 0.2s, transform 0.2s cubic-bezier(0.16,1,0.3,1);
    }
    .theme-card.active .theme-card-check { opacity: 1; transform: scale(1); }
    .theme-card-info {
      padding: 9px 12px 11px; background: #1c1c1e;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .theme-card-name {
      font-size: 13px; font-weight: 600; color: #e8e8ea; letter-spacing: -0.01em;
      line-height: 1.2;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }
    .theme-card-tag {
      font-size: 10px; color: rgba(255,255,255,0.28); margin-top: 2px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    }
  </style>
</head>
<body>
  <div id="theme-root"></div>

  <div id="settings-overlay">
    <div id="settings-sheet">
      <div id="settings-drag-handle"></div>
      <div id="settings-header">
        <span id="settings-title">Appearance</span>
        <button id="btn-settings-close">
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <line x1="1" y1="1" x2="8" y2="8"/><line x1="8" y1="1" x2="1" y2="8"/>
          </svg>
        </button>
      </div>
      <div id="theme-grid"></div>
    </div>
  </div>

<div id="kbd-bubble">
  <div id="kbd-bubble-inner">
    <div id="kbd-text-outer">
      <div id="kbd-text-inner">
        <span id="kbd-placeholder">Type to send to Mac…</span>
        <span id="kbd-text"></span>
        <span id="kbd-cursor"></span>
      </div>
    </div>
    <button id="kbd-clear" type="button">
      <svg width="8" height="8" viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="7" y2="7"/><line x1="7" y1="1" x2="1" y2="7"/></svg>
    </button>
  </div>
</div>

<script>
// ── Socket ────────────────────────────────────────────────────
const socket = io({ transports: ['websocket'] });

// ── Global state ──────────────────────────────────────────────
const SPEED_MIN = 0.5, SPEED_MAX = 5.0;
let sensitivity = 2.2;
let currentVolume = 50;
let activeFontLink = null;

// ── Socket status ─────────────────────────────────────────────
function refreshStatus() {
  const dot  = document.getElementById('status-dot');
  const txt  = document.getElementById('status-text');
  const lbl  = document.getElementById('status-label');
  const rcn  = document.getElementById('btn-reconnect');
  if (!dot) return;
  const conn = socket.connected;
  dot.className = conn ? 'connected' : 'disconnected';
  if (txt) txt.textContent = conn ? 'LIVE'    : 'OFFLINE';
  if (lbl) lbl.textContent = conn ? 'live'    : 'offline';
  if (rcn) rcn.style.display = conn ? 'none'  : 'flex';
}
socket.on('connect',    refreshStatus);
socket.on('disconnect', refreshStatus);

// ── Keyboard capture ──────────────────────────────────────────
const _kbdInput = document.createElement('input');
_kbdInput.type = 'text';
_kbdInput.setAttribute('autocomplete', 'off');
_kbdInput.setAttribute('autocorrect', 'off');
_kbdInput.setAttribute('autocapitalize', 'none');
_kbdInput.setAttribute('spellcheck', 'false');
Object.assign(_kbdInput.style, {
  position: 'fixed', opacity: '0', pointerEvents: 'none',
  top: '-200px', left: '0', width: '1px', height: '1px', fontSize: '16px',
  border: 'none', outline: 'none', background: 'transparent',
});
document.body.appendChild(_kbdInput);

let _kbdActive = false, _kbdLastLen = 0;

function _updateBubble() {
  const text = _kbdInput.value;
  const elText = document.getElementById('kbd-text');
  const elPh   = document.getElementById('kbd-placeholder');
  const inner  = document.getElementById('kbd-text-inner');
  const outer  = document.getElementById('kbd-text-outer');
  if (!elText) return;
  elText.textContent = text;
  if (elPh) elPh.style.display = text ? 'none' : '';
  if (inner && outer) {
    const overflow = inner.scrollWidth - outer.clientWidth;
    inner.style.transform = overflow > 0 ? `translateX(-${overflow}px)` : 'translateX(0)';
  }
}

function _repositionBubble() {
  const bubble = document.getElementById('kbd-bubble');
  if (!bubble || !_kbdActive) return;
  const vv = window.visualViewport;
  if (vv) {
    const kbdHeight = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
    bubble.style.bottom = (kbdHeight + 8) + 'px';
  }
}

function _showBubble() {
  const bubble = document.getElementById('kbd-bubble');
  if (!bubble) return;
  _updateBubble();
  bubble.classList.add('visible');
  _repositionBubble();
  setTimeout(_repositionBubble, 350);
}

function _hideBubble() {
  document.getElementById('kbd-bubble')?.classList.remove('visible');
}

window.visualViewport?.addEventListener('resize', () => { if (_kbdActive) _repositionBubble(); });

// Wire clear button
document.getElementById('kbd-clear')?.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const count = _kbdInput.value.length;
  if (count > 0) { socket.emit('key', { key: 'Backspace', count }); }
  _kbdInput.value = ''; _kbdLastLen = 0;
  _updateBubble();
  _kbdInput.focus();
}, { passive: false });

document.getElementById('kbd-clear')?.addEventListener('click', () => {
  const count = _kbdInput.value.length;
  if (count > 0) { socket.emit('key', { key: 'Backspace', count }); }
  _kbdInput.value = ''; _kbdLastLen = 0;
  _updateBubble();
});

_kbdInput.addEventListener('input', () => {
  const v = _kbdInput.value;
  if (v.length > _kbdLastLen) socket.emit('type', { text: v.slice(_kbdLastLen) });
  else if (v.length < _kbdLastLen) socket.emit('key', { key: 'Backspace', count: _kbdLastLen - v.length });
  _kbdLastLen = v.length;
  _updateBubble();
});

_kbdInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    socket.emit('key', { key: 'Enter' });
    _kbdInput.value = ''; _kbdLastLen = 0;
    _updateBubble();
  }
});

_kbdInput.addEventListener('blur', () => {
  _kbdActive = false;
  _kbdInput.style.pointerEvents = 'none';
  document.getElementById('btn-keyboard')?.classList.remove('active');
  _hideBubble();
});

function toggleKeyboard() {
  _kbdActive = !_kbdActive;
  if (_kbdActive) {
    _kbdInput.style.pointerEvents = 'auto';
    _kbdInput.value = ''; _kbdLastLen = 0;
    _kbdInput.focus();
    document.getElementById('btn-keyboard')?.classList.add('active');
    _showBubble();
  } else {
    _kbdInput.blur();
    _hideBubble();
  }
  navigator.vibrate?.(8);
}

// ── Vertical pill slider ───────────────────────────────────────
function setupVertSlider(trackId, fillId, valId, { toValue, toPct, format, onCommit }) {
  const track = document.getElementById(trackId);
  const fill  = document.getElementById(fillId);
  const label = document.getElementById(valId);
  if (!track || !fill || !label) return;
  let timer = null;

  function setPct(pct) {
    pct = Math.max(0, Math.min(1, pct));
    fill.style.height = (pct * 100) + '%';
    const val = toValue(pct);
    label.textContent = format(val);
    clearTimeout(timer);
    timer = setTimeout(() => onCommit(val), 60);
  }

  function fromTouch(e) {
    const r = track.getBoundingClientRect();
    return 1 - (e.touches[0].clientY - r.top) / r.height;
  }

  track.addEventListener('touchstart', (e) => { e.preventDefault(); setPct(fromTouch(e)); }, { passive: false });
  track.addEventListener('touchmove',  (e) => { e.preventDefault(); setPct(fromTouch(e)); }, { passive: false });
  fill.style.height = (toPct() * 100) + '%';
}

// ── Horizontal slider (Ctrl only) ─────────────────────────────
function setupHorizSlider(trackId, fillId, thumbId, valId, { toValue, toPct, format, onCommit }) {
  const track = document.getElementById(trackId);
  const fill  = document.getElementById(fillId);
  const thumb = document.getElementById(thumbId);
  const label = document.getElementById(valId);
  if (!track || !fill || !label) return;
  let timer = null;

  function setPct(pct) {
    pct = Math.max(0, Math.min(1, pct));
    const p = (pct * 100) + '%';
    fill.style.width = p;
    if (thumb) thumb.style.left = p;
    const val = toValue(pct);
    label.textContent = format(val);
    clearTimeout(timer);
    timer = setTimeout(() => onCommit(val), 60);
  }

  function fromTouch(e) {
    const r = track.getBoundingClientRect();
    return (e.touches[0].clientX - r.left) / r.width;
  }

  track.addEventListener('touchstart', (e) => { e.preventDefault(); setPct(fromTouch(e)); }, { passive: false });
  track.addEventListener('touchmove',  (e) => { e.preventDefault(); setPct(fromTouch(e)); }, { passive: false });
  const init = (toPct() * 100) + '%';
  fill.style.width = init;
  if (thumb) thumb.style.left = init;
}

// ── Trackpad ──────────────────────────────────────────────────
function setupTrackpad() {
  const tp = document.getElementById('trackpad');
  if (!tp) return;
  let lastX = null, lastY = null, startX = null, startY = null;
  let hasMoved = false, isScrolling = false;
  const THRESH = 8;

  function addRipple(x, y) {
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.left = x + 'px'; r.style.top = y + 'px';
    tp.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  }

  tp.addEventListener('touchstart', (e) => {
    e.preventDefault();
    isScrolling = e.touches.length >= 2; hasMoved = false;
    const t = e.touches[0];
    lastX = startX = t.clientX; lastY = startY = t.clientY;
    tp.classList.add('trackpad-active');
    if (isScrolling) {
      tp.classList.add('scroll-mode');
    } else {
      const r = tp.getBoundingClientRect();
      addRipple(t.clientX - r.left, t.clientY - r.top);
    }
  }, { passive: false });

  tp.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length >= 2 || isScrolling) {
      tp.classList.add('scroll-mode'); isScrolling = true; hasMoved = true;
      const t = e.touches[0];
      socket.emit('scroll', { dx: (t.clientX - lastX) * sensitivity * 0.4, dy: (t.clientY - lastY) * sensitivity * 0.4 });
      lastX = t.clientX; lastY = t.clientY; return;
    }
    const t = e.touches[0];
    if (Math.abs(t.clientX - startX) > THRESH || Math.abs(t.clientY - startY) > THRESH) hasMoved = true;
    const dx = (t.clientX - lastX) * sensitivity;
    const dy = (t.clientY - lastY) * sensitivity;
    if (Math.abs(dx) > 0.1 || Math.abs(dy) > 0.1) socket.emit('mousemove', { dx: Math.round(dx), dy: Math.round(dy) });
    lastX = t.clientX; lastY = t.clientY;
  }, { passive: false });

  tp.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (e.touches.length === 0) {
      if (!hasMoved && !isScrolling) { socket.emit('leftclick'); navigator.vibrate?.(8); }
      lastX = lastY = startX = startY = null; hasMoved = isScrolling = false;
      tp.classList.remove('trackpad-active', 'scroll-mode');
    }
  }, { passive: false });
}

// ── Shared init (power, settings, reconnect, click buttons) ───
function initShared() {
  refreshStatus();

  const powerBtn = document.getElementById('btn-power');
  if (powerBtn) {
    powerBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      powerBtn.classList.add('pressing');
      socket.emit('sleep'); navigator.vibrate?.(12);
      setTimeout(() => powerBtn.classList.remove('pressing'), 200);
    }, { passive: false });
  }

  const settingsBtn = document.getElementById('btn-settings');
  if (settingsBtn) {
    settingsBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      settingsBtn.classList.add('pressing');
      openSettings();
      setTimeout(() => settingsBtn.classList.remove('pressing'), 150);
    }, { passive: false });
    settingsBtn.addEventListener('click', openSettings);
  }

  const reconnBtn = document.getElementById('btn-reconnect');
  if (reconnBtn) {
    reconnBtn.addEventListener('touchstart', (e) => {
      e.preventDefault(); reconnBtn.textContent = '...'; socket.connect();
    }, { passive: false });
  }

  const kbdBtn = document.getElementById('btn-keyboard');
  if (kbdBtn) {
    kbdBtn.addEventListener('touchstart', (e) => {
      e.preventDefault(); kbdBtn.classList.add('pressing'); toggleKeyboard();
      setTimeout(() => kbdBtn.classList.remove('pressing'), 150);
    }, { passive: false });
    kbdBtn.addEventListener('click', toggleKeyboard);
  }

  function pressBtn(el, event) {
    el.classList.add('pressing'); socket.emit(event); navigator.vibrate?.(8);
    setTimeout(() => el.classList.remove('pressing'), 150);
  }
  const btnL = document.getElementById('btn-left');
  const btnR = document.getElementById('btn-right');
  if (btnL) btnL.addEventListener('touchstart', (e) => { e.preventDefault(); pressBtn(btnL, 'leftclick'); }, { passive: false });
  if (btnR) btnR.addEventListener('touchstart', (e) => { e.preventDefault(); pressBtn(btnR, 'rightclick'); }, { passive: false });

  setupTrackpad();
}

// ── Common init (vertical sliders) ────────────────────────────
function initCommon() {
  initShared();
  setupVertSlider('vol-slider', 'vol-fill', 'vol-val', {
    toValue: p => Math.round(p * 100),
    toPct:   () => currentVolume / 100,
    format:  v => v + '%',
    onCommit: v => {
      currentVolume = v; socket.emit('volume', { level: v });
      ['r-vol','m-vol'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = v; });
    },
  });
  setupVertSlider('spd-slider', 'spd-fill', 'spd-val', {
    toValue: p => SPEED_MIN + p * (SPEED_MAX - SPEED_MIN),
    toPct:   () => (sensitivity - SPEED_MIN) / (SPEED_MAX - SPEED_MIN),
    format:  v => v.toFixed(1),
    onCommit: v => {
      sensitivity = v;
      ['r-spd','m-spd'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = v.toFixed(1); });
    },
  });
}

// ── Ctrl init (horizontal sliders) ────────────────────────────
function initCtrl() {
  initShared();
  setupHorizSlider('vol-slider', 'vol-fill', 'vol-thumb', 'vol-val', {
    toValue: p => Math.round(p * 100),
    toPct:   () => currentVolume / 100,
    format:  v => v + '%',
    onCommit: v => { currentVolume = v; socket.emit('volume', { level: v }); },
  });
  setupHorizSlider('spd-slider', 'spd-fill', 'spd-thumb', 'spd-val', {
    toValue: p => SPEED_MIN + p * (SPEED_MAX - SPEED_MIN),
    toPct:   () => (sensitivity - SPEED_MIN) / (SPEED_MAX - SPEED_MIN),
    format:  v => v.toFixed(1),
    onCommit: v => { sensitivity = v; },
  });
}

// ── HTML helpers ──────────────────────────────────────────────
const SI = `<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="4.5" cy="4.5" r="2" fill="currentColor"/><circle cx="11.5" cy="4.5" r="2" fill="currentColor"/><circle cx="4.5" cy="11.5" r="2" fill="currentColor"/><circle cx="11.5" cy="11.5" r="2" fill="currentColor"/></svg>`;
const PI = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>`;
const LCI = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><defs><clipPath id="lc"><rect x="5" y="2" width="14" height="20" rx="7"/></clipPath></defs><rect x="5" y="2" width="14" height="20" rx="7"/><line x1="12" y1="2" x2="12" y2="10"/><line x1="5" y1="10" x2="19" y2="10"/><rect x="5" y="2" width="7" height="8" fill="currentColor" opacity="0.3" stroke="none" clip-path="url(#lc)"/></svg>`;
const RCI = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><defs><clipPath id="rc"><rect x="5" y="2" width="14" height="20" rx="7"/></clipPath></defs><rect x="5" y="2" width="14" height="20" rx="7"/><line x1="12" y1="2" x2="12" y2="10"/><line x1="5" y1="10" x2="19" y2="10"/><rect x="12" y="2" width="7" height="8" fill="currentColor" opacity="0.3" stroke="none" clip-path="url(#rc)"/></svg>`;
const KBI = `<svg width="15" height="11" viewBox="0 0 20 14" fill="currentColor" stroke="none" style="display:block"><rect x="0.75" y="0.75" width="18.5" height="12.5" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="3" width="2" height="2" rx="0.5"/><rect x="7" y="3" width="2" height="2" rx="0.5"/><rect x="11" y="3" width="2" height="2" rx="0.5"/><rect x="15" y="3" width="2" height="2" rx="0.5"/><rect x="3" y="7" width="2" height="2" rx="0.5"/><rect x="7" y="7" width="2" height="2" rx="0.5"/><rect x="11" y="7" width="2" height="2" rx="0.5"/><rect x="15" y="7" width="2" height="2" rx="0.5"/><rect x="5.5" y="11" width="9" height="1.5" rx="0.75"/></svg>`;

function stdPills() {
  return `<div id="sliders">
    <div class="pill-wrap">
      <span class="pill-label">Vol</span>
      <div class="pill-slider" id="vol-slider">
        <div class="pill-fill" id="vol-fill"></div>
        <svg class="pill-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <span class="pill-val" id="vol-val">50%</span>
      </div>
    </div>
    <div class="pill-wrap">
      <span class="pill-label">Spd</span>
      <div class="pill-slider" id="spd-slider">
        <div class="pill-fill" id="spd-fill"></div>
        <svg class="pill-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span class="pill-val" id="spd-val">2.2</span>
      </div>
    </div>
  </div>`;
}

function stdTp() {
  return `<div id="trackpad">
    <div id="trackpad-hint"><span>Tap to click</span><span>Drag to move</span><span>Two finger scroll</span></div>
    <div id="scroll-badge">Scroll</div>
  </div>`;
}

function stdTopbar(name, statusWord, extra = '') {
  return `<div id="topbar">
    <span id="wordmark">${name}</span>
    <div id="status-pill"><div id="status-dot"></div><span id="status-text">${statusWord}</span></div>
    <div class="topbar-right">
      <button id="btn-reconnect">retry</button>
      ${extra}
      <button id="btn-keyboard">${KBI}</button>
      <button id="btn-settings">${SI}</button>

// ── Apply theme ───────────────────────────────────────────────
function applyTheme(id) {
  const theme = THEMES.find(t => t.id === id);
  if (!theme) return;

  document.getElementById('theme-style').textContent = theme.css;
  document.getElementById('theme-root').innerHTML = theme.html;

  if (activeFontLink) { activeFontLink.remove(); activeFontLink = null; }
  if (theme.font) {
    activeFontLink = document.createElement('link');
    activeFontLink.rel = 'stylesheet';
    activeFontLink.href = theme.font;
    document.head.appendChild(activeFontLink);
  }

  theme.init();

  localStorage.setItem('mac-remote-theme', id);

  document.querySelectorAll('.theme-card').forEach(c => {
    c.classList.toggle('active', c.dataset.id === id);
  });
}

// ── Theme grid ────────────────────────────────────────────────
function buildMini(accent, light) {
  const b = light ? '0,0,0' : '255,255,255';
  return `<div style="display:flex;gap:4px;align-items:stretch;height:36px;width:58px;">
    <div style="display:flex;flex-direction:column;gap:3px;width:12px;">
      <div style="flex:1;border-radius:8px;border:1px solid ${accent}66;background:${accent}28;"></div>
      <div style="flex:1;border-radius:8px;border:1px solid rgba(${b},0.14);background:rgba(${b},0.07);"></div>
    </div>
    <div style="flex:1;border-radius:5px;border:1px solid rgba(${b},0.12);background:rgba(${b},0.06);"></div>
  </div>`;
}

function buildThemeGrid() {
  const saved = localStorage.getItem('mac-remote-theme') || 'default';
  const grid  = document.getElementById('theme-grid');

  grid.innerHTML = THEMES.map(t => `
    <div class="theme-card${t.id === saved ? ' active' : ''}" data-id="${t.id}" style="--card-accent:${t.accent};">
      <div class="theme-card-preview" style="background:${t.preview};">
        ${buildMini(t.accent, t.light)}
        <div class="theme-card-check">
          <svg width="9" height="7" viewBox="0 0 9 7" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,3.5 3.2,5.8 8,1"/></svg>
        </div>
      </div>
      <div class="theme-card-info">
        <div class="theme-card-name">${t.name}</div>
        <div class="theme-card-tag">${t.tag}</div>
      </div>
    </div>`).join('');

  grid.querySelectorAll('.theme-card').forEach(card => {
    let sy = 0, sx = 0;
    card.addEventListener('touchstart', (e) => { sy = e.touches[0].clientY; sx = e.touches[0].clientX; }, { passive: true });
    card.addEventListener('touchend', (e) => {
      if (Math.abs(e.changedTouches[0].clientY - sy) < 10 && Math.abs(e.changedTouches[0].clientX - sx) < 10) {
        e.preventDefault();
        applyTheme(card.dataset.id); navigator.vibrate?.(5);
        setTimeout(closeSettings, 480);
      }
    }, { passive: false });
    card.addEventListener('click', () => { applyTheme(card.dataset.id); setTimeout(closeSettings, 480); });
  });
}

// ── Settings panel ────────────────────────────────────────────
const overlay = document.getElementById('settings-overlay');
const sheet   = document.getElementById('settings-sheet');
const grid    = document.getElementById('theme-grid');

function openSettings()  { overlay.classList.add('open'); }
function closeSettings() { sheet.style.transition = ''; sheet.style.transform = ''; overlay.classList.remove('open'); }

document.getElementById('btn-settings-close').addEventListener('touchstart', (e) => { e.preventDefault(); closeSettings(); }, { passive: false });
document.getElementById('btn-settings-close').addEventListener('click', closeSettings);

overlay.addEventListener('touchstart', (e) => { if (e.target === overlay) { e.preventDefault(); closeSettings(); } }, { passive: false });
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeSettings(); });

let swipeY = 0, swipeDelta = 0, isSwiping = false;
sheet.addEventListener('touchstart', (e) => { swipeY = e.touches[0].clientY; swipeDelta = 0; isSwiping = false; }, { passive: true });
sheet.addEventListener('touchmove', (e) => {
  const dy = e.touches[0].clientY - swipeY; swipeDelta = dy;
  if (dy > 4 && grid.scrollTop === 0) { isSwiping = true; sheet.style.transition = 'none'; sheet.style.transform = `translateY(${dy}px)`; }
}, { passive: true });
sheet.addEventListener('touchend', () => {
  if (isSwiping && swipeDelta > 80) closeSettings();
  else { sheet.style.transition = ''; sheet.style.transform = ''; }
  isSwiping = false;
});

// ── Init ──────────────────────────────────────────────────────
buildThemeGrid();
applyTheme(localStorage.getItem('mac-remote-theme') || 'default');

fetch('/volume').then(r => r.json()).then(d => {
  currentVolume = d.level;
  const fill = document.getElementById('vol-fill');
  const val  = document.getElementById('vol-val');
  if (fill) fill.style.height = d.level + '%';
  if (val)  val.textContent   = d.level + '%';
  ['r-vol','m-vol'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = d.level; });
}).catch(() => {});
</script>

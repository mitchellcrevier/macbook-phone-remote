name: MacRemote
options:
  bundleIdPrefix: com.mitchellcrevier
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MacRemote:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: MacRemote
    info:
      path: MacRemote/Info.plist
      properties:
        CFBundleDisplayName: Mac Remote
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: "Mac Remote needs local network access to connect to your Mac."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mitchellcrevier.macremote
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
